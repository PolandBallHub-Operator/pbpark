<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polska Message - ポーランドボール・メッセージカード</title>
  
  <style>
    :root {
      /* デフォルトのMyouIトークン（JSで動的にオーバーライドされます） */
      --myoui-sys-color-background: #E8EFE3;
      --myoui-sys-color-surface-card: #F2F8EC;
      --myoui-sys-color-surface-variant: #DEE5D6;
      --myoui-sys-color-on-background: #191C18;
      --myoui-sys-color-on-surface: #191C18;
      --myoui-sys-color-on-surface-variant: #43483E;
      --myoui-sys-color-primary: #1F6C30;
      --myoui-sys-color-on-primary: #FFFFFF;
      --myoui-sys-color-primary-container: #C2E7C1;
      --myoui-sys-color-on-primary-container: #002107;
      --myoui-sys-color-outline: #73796E;
      --myoui-sys-color-outline-focused: #1F6C30;

      /* MyouI Radius Spec */
      --myoui-radius-card: 20px;
      --myoui-radius-dialog: 28px;
      --myoui-radius-pill: 50px;
      --myoui-radius-input: 12px;
      --myoui-radius-btn: 20px;

      --myoui-font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--myoui-font);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--myoui-sys-color-background);
      color: var(--myoui-sys-color-on-background);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    .app-frame {
      width: 100%;
      max-width: 480px;
      background-color: var(--myoui-sys-color-surface-card);
      border-radius: var(--myoui-radius-card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: background-color 0.3s;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--myoui-sys-color-surface-variant);
      padding-bottom: 12px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--myoui-sys-color-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .card-canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1.6 / 1;
      border-radius: var(--myoui-radius-card);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transition: transform 0.3s ease;
    }

    .card-canvas-container.bounce {
      animation: ballBounce 0.6s ease infinite alternate;
    }

    @keyframes ballBounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

    /* Background Templates */
    .bg-tpl-0 {
      /* Poland Flag */
      background: linear-gradient(180deg, #FFFFFF 50%, #DC143C 50%);
    }
    .bg-tpl-1 {
      /* Material 3 Dynamic Gradient */
      background: linear-gradient(135deg, var(--myoui-sys-color-primary-container) 0%, var(--myoui-sys-color-background) 100%);
    }
    .bg-tpl-2 {
      /* Pastel Sky */
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
    }
    .bg-tpl-3 {
      /* Cyber Punk Space */
      background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
    }

    .card-content-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      color: #000;
    }

    /* Light/Dark text handling depending on template */
    .bg-tpl-3 .card-content-wrapper {
      color: #FFF;
    }

    .poland-image-container {
      position: absolute;
      bottom: 8px;
      right: 12px;
      width: 100px;
      height: 100px;
      z-index: 1;
    }

    .poland-image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
    }

    .speech-bubble {
      position: relative;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 12px 16px;
      max-width: 240px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #111;
      border: 2px solid #000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-left: 12px;
      margin-top: 12px;
      z-index: 2;
      word-break: break-all;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      right: 30px;
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: rgba(255, 255, 255, 0.92) transparent;
      display: block;
      width: 0;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -13px;
      right: 28px;
      border-width: 12px 12px 0;
      border-style: solid;
      border-color: #000 transparent;
      display: block;
      width: 0;
      z-index: -1;
    }

    /* Inputs with floating labels */
    .myoui-textfield {
      position: relative;
      width: 100%;
      margin-top: 8px;
    }

    .myoui-textfield input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      background: transparent;
      border: 1.5px solid var(--myoui-sys-color-outline);
      border-radius: var(--myoui-radius-input);
      font-size: 16px;
      color: var(--myoui-sys-color-on-background);
      outline: none;
      transition: border-color 0.2s, border-width 0.1s;
    }

    .myoui-textfield label {
      position: absolute;
      left: 12px;
      top: -10px;
      background-color: var(--myoui-sys-color-surface-card);
      padding: 0 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--myoui-sys-color-outline);
      transition: color 0.2s;
    }

    .myoui-textfield input:focus {
      border-color: var(--myoui-sys-color-outline-focused);
      border-width: 2px;
    }

    .myoui-textfield input:focus + label {
      color: var(--myoui-sys-color-outline-focused);
    }

    .char-counter {
      text-align: right;
      font-size: 12px;
      color: var(--myoui-sys-color-on-surface-variant);
      margin-top: 4px;
    }

    .section-headline {
      font-size: 14px;
      font-weight: 700;
      color: var(--myoui-sys-color-on-surface-variant);
      margin-top: 4px;
    }

    .tpl-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .tpl-btn {
      aspect-ratio: 1.6 / 1;
      border-radius: var(--myoui-radius-input);
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
    }

    .tpl-btn:active {
      transform: scale(0.95);
    }

    .tpl-btn.selected {
      border-color: var(--myoui-sys-color-primary);
      box-shadow: 0 0 0 2px var(--myoui-sys-color-primary-container);
    }

    /* Button styles */
    .myoui-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--myoui-radius-btn);
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      width: 100%;
    }

    .btn-primary {
      background-color: var(--myoui-sys-color-primary);
      color: var(--myoui-sys-color-on-primary);
    }

    .btn-container {
      background-color: var(--myoui-sys-color-primary-container);
      color: var(--myoui-sys-color-on-primary-container);
    }

    .btn-outlined {
      background-color: transparent;
      border: 1.5px solid var(--myoui-sys-color-outline);
      color: var(--myoui-sys-color-primary);
    }

    .myoui-btn:active {
      opacity: 0.85;
    }

    .color-picker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--myoui-sys-color-surface-variant);
      padding: 12px 16px;
      border-radius: var(--myoui-radius-input);
    }

    .color-picker-row label {
      font-size: 14px;
      font-weight: 700;
    }

    .color-picker-row input[type="color"] {
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      background: none;
    }

    .share-box {
      background-color: var(--myoui-sys-color-primary-container);
      color: var(--myoui-sys-color-on-primary-container);
      padding: 16px;
      border-radius: var(--myoui-radius-card);
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .share-url {
      background-color: rgba(255,255,255,0.7);
      padding: 10px;
      border-radius: var(--myoui-radius-input);
      font-size: 12px;
      word-break: break-all;
      color: #333;
      user-select: all;
    }

    /* Dialog Modal Style */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s, visibility 0.25s;
    }

    .dialog-backdrop.is-open {
      opacity: 1;
      visibility: visible;
    }

    .myoui-dialog {
      background-color: var(--myoui-sys-color-surface-card);
      border-radius: var(--myoui-radius-dialog);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: scale(0.9);
      transition: transform 0.25s ease;
    }

    .dialog-backdrop.is-open .myoui-dialog {
      transform: scale(1);
    }

    .dialog-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--myoui-sys-color-primary);
    }

    .dialog-desc {
      font-size: 14px;
      color: var(--myoui-sys-color-on-surface-variant);
      line-height: 1.5;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Hidden Utilities */
    .hidden {
      display: none !important;
    }
  </style>

  <script type="module">
    import {
      argbFromHex,
      hexFromArgb,
      Hct,
      SchemeTonalSpot
    } from 'https://esm.run/@material/material-color-utilities';

    /**
     * M3カラーを動的に生成し:rootへ注入する
     */
    function applyDynamicM3Theme(seedHex, isDark = false) {
      try {
        const seedArgb = argbFromHex(seedHex);
        const hct = Hct.fromInt(seedArgb);
        const scheme = new SchemeTonalSpot(hct, isDark, 0.0);

        const myouiColors = {
          '--myoui-sys-color-background': hexFromArgb(scheme.background),
          '--myoui-sys-color-on-background': hexFromArgb(scheme.onBackground),
          
          '--myoui-sys-color-surface-card': hexFromArgb(scheme.surfaceContainerLow),
          '--myoui-sys-color-surface-variant': hexFromArgb(scheme.surfaceVariant),
          '--myoui-sys-color-on-surface': hexFromArgb(scheme.onSurface),
          '--myoui-sys-color-on-surface-variant': hexFromArgb(scheme.onSurfaceVariant),
          
          '--myoui-sys-color-primary': hexFromArgb(scheme.primary),
          '--myoui-sys-color-on-primary': hexFromArgb(scheme.onPrimary),
          '--myoui-sys-color-primary-container': hexFromArgb(scheme.primaryContainer),
          '--myoui-sys-color-on-primary-container': hexFromArgb(scheme.onPrimaryContainer),
          
          '--myoui-sys-color-outline': hexFromArgb(scheme.outline),
          '--myoui-sys-color-outline-focused': hexFromArgb(scheme.primary)
        };

        const root = document.documentElement;
        for (const [key, value] of Object.entries(myouiColors)) {
          root.style.setProperty(key, value);
        }
      } catch (e) {
        console.error("Color Gen Failed, using fallback", e);
      }
    }

    // グローバルにバインド
    window.applyDynamicM3Theme = applyDynamicM3Theme;
  </script>
</head>
<body>

  <div class="app-frame">
    
    <header class="app-header">
      <div class="app-title">
        <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/lol.png" alt="Polandball Logo" onerror="this.src='https://placehold.co/40x40/dc143c/ffffff?text=P';">
        <span>Polska Message</span>
      </div>
      <div class="badge" id="modeBadge" style="font-size: 11px; font-weight: 700; background: var(--myoui-sys-color-primary-container); color: var(--myoui-sys-color-on-primary-container); padding: 4px 8px; border-radius: var(--myoui-radius-pill);">
        Create
      </div>
    </header>

    <!-- Visual Card Preview -->
    <div class="card-canvas-container bg-tpl-0" id="cardContainer">
      <div class="card-content-wrapper">
        <div class="speech-bubble" id="messageBubble">Polska!</div>
        <div class="poland-image-container">
          <img id="polandBallImg" src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/lol.png" alt="Polandball" onerror="this.style.display='none';">
        </div>
      </div>
    </div>

    <div id="creationPanel" class="flex-column-gap">
      <div style="display: flex; flex-direction: column; gap: 14px;">
        
        <div class="myoui-textfield">
          <input type="text" id="msgInput" value="Polska!" maxlength="20" placeholder=" ">
          <label for="msgInput">メッセージ (最大20文字)</label>
        </div>
        <div class="char-counter" id="charCounter">7 / 20 文字</div>

        <div class="section-headline">背景テンプレート</div>
        <div class="tpl-selector">
          <div class="tpl-btn bg-tpl-0 selected" onclick="selectTemplate(0)" id="tpl0"></div>
          <div class="tpl-btn bg-tpl-1" onclick="selectTemplate(1)" id="tpl1"></div>
          <div class="tpl-btn bg-tpl-2" onclick="selectTemplate(2)" id="tpl2"></div>
          <div class="tpl-btn bg-tpl-3" onclick="selectTemplate(3)" id="tpl3"></div>
        </div>

        <div class="section-headline">テーマカラー (Material 3)</div>
        <div class="color-picker-row">
          <label for="m3ColorPicker">シードカラー</label>
          <input type="color" id="m3ColorPicker" value="#dc143c">
        </div>

        <button class="myoui-btn btn-primary" onclick="generateShareableLink()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          共有リンクを作成
        </button>

      </div>
    </div>

    <div id="shareArea" class="share-box hidden">
      <div style="font-weight: 700; font-size: 14px;">🎉 メッセージカードが完成しました！</div>
      <div class="share-url" id="shareUrlBox">...</div>
      <div style="display: flex; gap: 10px;">
        <button class="myoui-btn btn-container" style="flex: 1;" onclick="copyShareLink()">リンクをコピー</button>
        <button class="myoui-btn btn-outlined" style="flex: 1;" onclick="resetApp()">新しく作る</button>
      </div>
    </div>

    <div id="viewPanel" class="hidden">
      <div style="display: flex; flex-direction: column; gap: 12px; text-align: center;">
        <p style="font-size: 14px; color: var(--myoui-sys-color-on-surface-variant);">あなたへのメッセージが届いています！</p>
        <button class="myoui-btn btn-primary" onclick="goToCreateMode()">
          自分もメッセージカードを作る 🇵🇱
        </button>
      </div>
    </div>

  </div>

  <!-- Dialog Modal -->
  <div class="dialog-backdrop" id="customDialog">
    <div class="myoui-dialog">
      <div class="dialog-title" id="dialogTitle">メッセージ</div>
      <div class="dialog-desc" id="dialogMsg">ここに内容が表示されます</div>
      <div class="dialog-actions">
        <button class="myoui-btn btn-primary" style="width: auto; padding: 8px 16px;" onclick="closeMsgDialog()">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let currentTemplateIndex = 0;
    let selectedColor = '#dc143c';

    // Elements
    const msgInput = document.getElementById('msgInput');
    const charCounter = document.getElementById('charCounter');
    const messageBubble = document.getElementById('messageBubble');
    const cardContainer = document.getElementById('cardContainer');
    const creationPanel = document.getElementById('creationPanel');
    const shareArea = document.getElementById('shareArea');
    const viewPanel = document.getElementById('viewPanel');
    const shareUrlBox = document.getElementById('shareUrlBox');
    const modeBadge = document.getElementById('modeBadge');
    const m3ColorPicker = document.getElementById('m3ColorPicker');

    // Init App Mode logic based on URL params
    window.addEventListener('DOMContentLoaded', () => {
      // 1. URLパラメータの確認
      const params = new URLSearchParams(window.location.search);
      const msgParam = params.get('msg');
      const bgParam = params.get('bg');
      const colParam = params.get('col');

      // 2. テーマカラーの適用 (動的 Material 3 カラー生成)
      if (colParam) {
        selectedColor = colParam;
        m3ColorPicker.value = colParam;
      }
      triggerThemeColor(selectedColor);

      // 3. モード分岐
      if (msgParam !== null) {
        // ビューワーモード (編集不可)
        setViewerMode(decodeURIComponent(msgParam), parseInt(bgParam) || 0);
      } else {
        // クリエイターモード (編集可能)
        setCreatorMode();
      }

      // リアルタイムテキスト連動
      msgInput.addEventListener('input', () => {
        const text = msgInput.value;
        charCounter.textContent = `${text.length} / 20 文字`;
        messageBubble.textContent = text ? text : 'Polska!';
      });

      // カラーピッカー連動
      m3ColorPicker.addEventListener('input', (e) => {
        selectedColor = e.target.value;
        triggerThemeColor(selectedColor);
      });
    });

    function selectTemplate(index) {
      currentTemplateIndex = index;
      
      // ボタンのハイライト
      for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`tpl${i}`);
        if (i === index) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      }

      // プレビュー背景変更
      cardContainer.className = 'card-canvas-container';
      cardContainer.classList.add(`bg-tpl-${index}`);
    }

    function triggerThemeColor(hex) {
      if (window.applyDynamicM3Theme) {
        window.applyDynamicM3Theme(hex, false);
      }
    }

    function setViewerMode(msg, bgIndex) {
      modeBadge.textContent = "Received";
      creationPanel.classList.add('hidden');
      shareArea.classList.add('hidden');
      viewPanel.classList.remove('hidden');
      
      // プレビューの値を設定
      messageBubble.textContent = msg;
      selectTemplate(bgIndex);

      // 閲覧モード限定のふわふわアニメーション追加
      cardContainer.classList.add('bounce');
    }

    function setCreatorMode() {
      modeBadge.textContent = "Create";
      creationPanel.classList.remove('hidden');
      viewPanel.classList.add('hidden');
      shareArea.classList.add('hidden');
      cardContainer.classList.remove('bounce');
    }

    function generateShareableLink() {
      const msg = encodeURIComponent(msgInput.value.trim() || 'Polska!');
      const bg = currentTemplateIndex;
      const col = encodeURIComponent(selectedColor);

      // 共有用URL構築
      const baseUrl = window.location.origin + window.location.pathname;
      const shareUrl = `${baseUrl}?msg=${msg}&bg=${bg}&col=${col}`;

      shareUrlBox.textContent = shareUrl;
      shareArea.classList.remove('hidden');
    }

    function copyShareLink() {
      const textToCopy = shareUrlBox.textContent;
      
      // 旧環境でも動くように clipboard API / execCommand フォールバックを使用
      const textarea = document.createElement('textarea');
      textarea.value = textToCopy;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        openMsgDialog("コピー成功", "メッセージカードの共有リンクをクリップボードにコピーしました！SNS等で友達に送りましょう。");
      } catch (err) {
        console.error('Copy failed', err);
      }
      document.body.removeChild(textarea);
    }

    function resetApp() {
      msgInput.value = "Polska!";
      charCounter.textContent = "7 / 20 文字";
      messageBubble.textContent = "Polska!";
      selectTemplate(0);
      selectedColor = '#dc143c';
      m3ColorPicker.value = selectedColor;
      triggerThemeColor(selectedColor);
      shareArea.classList.add('hidden');
    }

    function goToCreateMode() {
      // URLのパラメータを除去して再読み込み
      const baseUrl = window.location.origin + window.location.pathname;
      window.location.href = baseUrl;
    }

    // Custom non-alert dialogs
    function openMsgDialog(title, text) {
      document.getElementById('dialogTitle').textContent = title;
      document.getElementById('dialogMsg').textContent = text;
      document.getElementById('customDialog').classList.add('is-open');
    }

    function closeMsgDialog() {
      document.getElementById('customDialog').classList.remove('is-open');
    }
  </script>
</body>
</html>
