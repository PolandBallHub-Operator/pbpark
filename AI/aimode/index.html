<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G AI Mode - Zugang</title>

    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <!-- Import Map for Material Web & Color Utilities -->
    <script type="importmap">
    {
        "imports": {
            "@material/web/": "https://esm.run/@material/web/",
            "@material/material-color-utilities": "https://esm.run/@material/material-color-utilities"
        }
    }
    </script>

    <style>
        /* =========================================
           CSS Setup (ベースコードの設計思想を完全遵守)
           ========================================= */
        :root {
            --md-sys-color-primary: #6750a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #eaddff;
            --md-sys-color-on-primary-container: #21005d;
            --md-sys-color-secondary: #625b71;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #e8def8;
            --md-sys-color-on-secondary-container: #1d192b;
            --md-sys-color-tertiary: #7d5260;
            --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #ffd8e4;
            --md-sys-color-on-tertiary-container: #31111d;
            --md-sys-color-error: #b3261e;
            --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #f9dedc;
            --md-sys-color-on-error-container: #410e0b;
            --md-sys-color-background: #fffbfe;
            --md-sys-color-on-background: #1c1b1f;
            --md-sys-color-surface: #fffbfe;
            --md-sys-color-on-surface: #1c1b1f;
            --md-sys-color-surface-variant: #e7e0ec;
            --md-sys-color-on-surface-variant: #49454f;
            --md-sys-color-outline: #79747e;
            --md-sys-color-outline-variant: #c4c7c5;
            
            --md-ref-typeface-brand: 'Google Sans', sans-serif;
            --md-ref-typeface-plain: 'Roboto', sans-serif;
            --transition-duration: 0.3s;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--md-ref-typeface-plain);
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            transition: background-color var(--transition-duration), color var(--transition-duration);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        header h1 {
            margin: 0;
            font-family: var(--md-ref-typeface-brand);
            font-size: 22px;
            font-weight: 500;
        }

        main {
            flex: 1;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Character tangle Style (ご指定のCSSを継承) */
        .tangle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .character-tangle {
            width: 140px; height: 210px;
            border: 4px solid #1a1a1a;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stripe { flex: 1; position: relative; }
        .stripe-black { background: #1a1a1a; }
        .stripe-white { background: #ffffff; }
        .stripe-red   { background: #e63946; }
        .eyes {
            position: absolute; bottom: 15%; width: 100%;
            display: flex; justify-content: center; gap: 20%;
        }
        .eye { width: 6px; height: 6px; background: #fff; border-radius: 50%; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .speech-bubble {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            padding: 12px 20px;
            border-radius: 20px;
            margin-top: 16px;
            font-family: var(--md-ref-typeface-brand);
            font-weight: 500;
            position: relative;
            max-width: 80%;
            animation: fadeScale 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Search Section */
        .search-container {
            width: 100%;
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .mode-toggle-card {
            background-color: var(--md-sys-color-surface-variant);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--md-sys-color-on-surface-variant);
        }

        /* Theme Picker (Base Code Logic) */
        .color-config {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 5;
        }
        
        #source-color {
            -webkit-appearance: none;
            border: 2px solid var(--md-sys-color-outline);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Top App Bar -->
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <md-icon-button><span class="material-symbols-outlined">menu</span></md-icon-button>
            <h1>AIMode help</h1>
        </div>
        <div style="display:flex; align-items:center;">
            <md-icon-button onclick="window.toggleDarkMode()">
                <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            </md-icon-button>
        </div>
    </header>

    <main>
        <!-- Character Section -->
        <div class="tangle-wrapper" onclick="window.performSearch()">
            <div class="character-tangle">
                <div class="stripe stripe-black">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                </div>
                <div class="stripe stripe-white"></div>
                <div class="stripe stripe-red"></div>
            </div>
        </div>

        <div class="speech-bubble" id="tangle-speech">
            Guten Tag.イッヒが調べてくる。
        </div>

        <!-- Input Section -->
        <div class="search-container">
            <md-outlined-text-field 
                id="search-input" 
                label="質問を入力..." 
                placeholder="Was ist das?"
                style="width: 100%;">
                <md-icon slot="leading-icon"><span class="material-symbols-outlined">search</span></md-icon>
            </md-outlined-text-field>

            <div class="mode-toggle-card">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="material-symbols-outlined">Psychology</span>
                    <span style="font-weight: 500;">タングル解答モード</span>
                </div>
                <md-switch id="tangle-mode" icons></md-switch>
            </div>

            <md-filled-button onclick="window.performSearch()" style="height: 56px; border-radius: 28px;">
                <span class="material-symbols-outlined" slot="icon">search</span>
                質問する
            </md-filled-button>
        </div>
    </main>

    <!-- Floating Color Picker (Dynamic Theme) -->
    <div class="color-config">
        <input type="color" id="source-color" value="#4285F4" oninput="window.updateTheme(this.value)">
    </div>

    <!-- JavaScript Implementation (ベースコードのコアロジックを継承) -->
    <script type="module">
        import '@material/web/all.js';
        import { 
            argbFromHex, 
            themeFromSourceColor, 
            applyTheme 
        } from "@material/material-color-utilities";

        // --- Global State ---
        let isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        let currentSourceColor = '#4285F4';

        // --- Theme Engine (ベースコードを維持) ---
        window.updateTheme = function(hexColor) {
            currentSourceColor = hexColor;
            const argb = argbFromHex(hexColor);
            const theme = themeFromSourceColor(argb);
            const scheme = isDarkMode ? theme.schemes.dark : theme.schemes.light;
            const root = document.documentElement;
            
            const tokenMap = {
                'primary': scheme.primary,
                'on-primary': scheme.onPrimary,
                'primary-container': scheme.primaryContainer,
                'on-primary-container': scheme.onPrimaryContainer,
                'secondary': scheme.secondary,
                'on-secondary': scheme.onSecondary,
                'secondary-container': scheme.secondaryContainer,
                'on-secondary-container': scheme.onSecondaryContainer,
                'tertiary': scheme.tertiary,
                'on-tertiary': scheme.onTertiary,
                'tertiary-container': scheme.tertiaryContainer,
                'on-tertiary-container': scheme.onTertiaryContainer,
                'error': scheme.error,
                'on-error': scheme.onError,
                'error-container': scheme.errorContainer,
                'on-error-container': scheme.onErrorContainer,
                'background': scheme.background,
                'on-background': scheme.onBackground,
                'surface': scheme.surface,
                'on-surface': scheme.onSurface,
                'surface-variant': scheme.surfaceVariant,
                'on-surface-variant': scheme.onSurfaceVariant,
                'outline': scheme.outline,
                'outline-variant': scheme.outlineVariant
            };

            for (const [key, value] of Object.entries(tokenMap)) {
                root.style.setProperty(`--md-sys-color-${key}`, hexFromArgb(value));
            }
        };

        function hexFromArgb(argb) {
            const r = (argb >> 16) & 0xff;
            const g = (argb >> 8) & 0xff;
            const b = argb & 0xff;
            return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
        }

        window.toggleDarkMode = function() {
            isDarkMode = !isDarkMode;
            document.getElementById('theme-icon').textContent = isDarkMode ? 'light_mode' : 'dark_mode';
            window.updateTheme(currentSourceColor);
        };

        // --- Search Logic ---
        window.performSearch = function() {
            const input = document.getElementById('search-input');
            const query = input.value.trim();
            const isTangleMode = document.getElementById('tangle-mode').selected;
            
            if (!query) {
                updateSpeech("何か入力するデス。Schnell!");
                return;
            }

            updateSpeech("Guten Tag. イッヒが調べてくる。");

            let finalQuery = query;
            if (isTangleMode) {
                // タングル口調のプロンプトを注入
                finalQuery = `「${query}」についてポーランドボールのR.タングルの口調で解答してください。冷徹で無機質で威圧的で片言の日本語 ＋ ドイツ語単語で話し、口癖: 「グーテンターク」「〜デス」「〜マス」で。`;
            }

            // 指定されたURLへリダイレクト
            const searchUrl = `https://google.com/ai?q=${encodeURIComponent(finalQuery)}`;
            
            // 演出のために少し遅延させてリダイレクト
            setTimeout(() => {
                window.open(searchUrl, '_blank');
            }, 800);
        };

        function updateSpeech(text) {
            const el = document.getElementById('tangle-speech');
            el.style.animation = 'none';
            el.offsetHeight; // reflow
            el.textContent = text;
            el.style.animation = 'fadeScale 0.4s cubic-bezier(0.2, 0, 0, 1) forwards';
        }

        // Initialize
        window.updateTheme(currentSourceColor);
    </script>
</body>
</html>
