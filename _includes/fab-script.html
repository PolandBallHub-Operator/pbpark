<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    const menuBtn = document.getElementById('menuBtn');
    const navDrawer = document.getElementById('navDrawer');
    const scrim = document.getElementById('scrim');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    const root = document.documentElement;

    // 1. ドロワーメニュー制御
    if (menuBtn && navDrawer && scrim) {
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navDrawer.opened = true;
        scrim.classList.add('show');
      });

      scrim.addEventListener('click', () => {
        navDrawer.opened = false;
        scrim.classList.remove('show');
      });

      const linkItems = document.querySelectorAll('.link-item');
      linkItems.forEach(item => {
        item.addEventListener('click', () => {
          navDrawer.opened = false;
          scrim.classList.remove('show');
        });
      });
    }

    // 2. ダークモード管理
    const updateThemeUI = (isDark) => {
      if (isDark) {
        root.classList.add('dark-mode');
        if (themeToggleBtn) themeToggleBtn.label = "ライトモードにする";
        if (themeIcon) themeIcon.textContent = "light_mode";
      } else {
        root.classList.remove('dark-mode');
        if (themeToggleBtn) themeToggleBtn.label = "ダークモードにする";
        if (themeIcon) themeIcon.textContent = "dark_mode";
      }
    };

    const savedTheme = localStorage.getItem('pbhub-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDarkMode = savedTheme === 'dark' || (!savedTheme && prefersDark);
    
    updateThemeUI(isDarkMode);

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const nextDark = !root.classList.contains('dark-mode');
        updateThemeUI(nextDark);
        localStorage.setItem('pbhub-theme', nextDark ? 'dark' : 'light');
      });
    }
  });
</script>
