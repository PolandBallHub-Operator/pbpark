<style>
  .floating-menu-button {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 1000;
  }

  md-navigation-drawer {
    --md-navigation-drawer-container-color: var(--md-sys-color-surface);

  }

  .drawer-header {
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--md-sys-color-outline-variant);
    background-color: var(--md-sys-color-surface);
  }

  .drawer-logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
  }

  .drawer-title {
    font-size: 24px;
    font-weight: 500;
    margin: 0;
    font-family: var(--md-ref-typeface-brand);
    color: var(--md-sys-color-on-surface);
  }

  .scrim {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;

    display: none;
    opacity: 0;

    pointer-events: none;

  }

  :root.dark-mode .drawer-header {
    border-bottom-color: var(--md-sys-color-outline-variant);
    background-color: var(--md-sys-color-surface);
  }

  :root.dark-mode .drawer-title {
    color: var(--md-sys-color-on-surface);
  }
</style>
