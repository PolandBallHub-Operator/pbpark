<!-- ハンバーガーメニューボタン（左上固定） -->
<md-fab id="menuBtn" size="medium" variant="secondary" aria-label="メニューを開く" style="position: fixed; top: 16px; left: 16px; z-index: 1000;">
  <md-icon slot="icon">menu</md-icon>
</md-fab>

<!-- 背景マスク（スクリム） -->
<div id="scrim" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.4); z-index: 1500; display: none; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;"></div>

<!-- ナビゲーションドロワー -->
<md-navigation-drawer id="navDrawer" style="--md-navigation-drawer-container-shape: 0 16px 16px 0; z-index: 2000;">
  <div slot="header" style="padding: 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--md-sys-color-outline-variant);">
    <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/normal.png" alt="PBHub Logo" style="width: 40px; height: 40px; object-fit: contain;">
    <h2 style="font-size: 24px; font-weight: 500; margin: 0; font-family: var(--md-ref-typeface-brand);">PBHub</h2>
  </div>

  <md-navigation-drawer-item label="ホーム" href="{{ '/' | relative_url }}" class="link-item">
    <md-icon slot="icon">home</md-icon>
  </md-navigation-drawer-item>

  <md-navigation-drawer-item label="ブログ" href="{{ '/blog/' | relative_url }}" class="link-item">
    <md-icon slot="icon">rss_feed</md-icon>
  </md-navigation-drawer-item>

  <md-navigation-drawer-item label="アバウト" href="{{ '/about/' | relative_url }}" class="link-item">
    <md-icon slot="icon">info</md-icon>
  </md-navigation-drawer-item>

  <div style="height: 1px; background-color: var(--md-sys-color-outline-variant); margin: 8px 16px;"></div>

  <md-navigation-drawer-item id="themeToggleBtn" label="ダークモードにする">
    <md-icon slot="icon" id="themeIcon">dark_mode</md-icon>
  </md-navigation-drawer-item>
</md-navigation-drawer>

<style>
  .scrim.show {
    display: block;
    opacity: 1;
    pointer-events: auto;
  }
</style>
