<!-- ハンバーガーメニューボタン -->

</md-fab>

<!-- スクリム（背景オーバーレイ） -->

<md-navigation-drawer id="navDrawer" style="z-index: 1001;">
  <!-- ドロワーヘッダー -->
  <div slot="header" style="padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--md-sys-color-outline-variant); background-color: var(--md-sys-color-surface);">
    <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/normal.png" alt="PBHub" style="width: 40px; height: 40px; object-fit: contain;">

  </div>

  <!-- ナビゲーション項目 -->
  <md-navigation-drawer-item label="ホーム" href="{{ '/' | relative_url }}" class="nav-link">
    <md-icon slot="icon">home</md-icon>
  </md-navigation-drawer-item>

  <md-navigation-drawer-item label="ブログ" href="{{ '/blog/' | relative_url }}" class="nav-link">
    <md-icon slot="icon">article</md-icon>
  </md-navigation-drawer-item>

  <md-navigation-drawer-item label="アバウト" href="{{ '/about/' | relative_url }}" class="nav-link">
    <md-icon slot="icon">info</md-icon>
  </md-navigation-drawer-item>

  <div style="height: 1px; background-color: var(--md-sys-color-outline-variant); margin: 12px 0;"></div>

  <md-navigation-drawer-item id="themeToggleItem" label="ダークモードにする">
    <md-icon slot="icon" id="themeIcon">dark_mode</md-icon>
  </md-navigation-drawer-item>
</md-navigation-drawer>

<style>
  #scrim.show {
    display: block;
    opacity: 1;
  }
</style>
