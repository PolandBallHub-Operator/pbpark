<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - PBHub</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    :root {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-variant: #E7E0EC;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-background: #FEF7FF;
      --md-sys-color-on-background: #1D1B20;
      
      font-family: Roboto, system-ui, -apple-system, sans-serif;
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ダークモードのカラーパレット */
    :root[data-theme="dark"] {
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-primary-container: #4F378B;
      --md-sys-color-on-primary-container: #EADDFF;
      --md-sys-color-surface: #141218;
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-surface-variant: #49454F;
      --md-sys-color-on-surface-variant: #CAC4D0;
      --md-sys-color-outline: #938F99;
      --md-sys-color-background: #141218;
      --md-sys-color-on-background: #E6E1E5;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* M3仕様 左上固定のフローティングメニューボタン (FAB) */
    .floating-menu-button {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 56px;
      height: 56px;
      border-radius: 16px; /* M3のFABは丸みを帯びた四角形 */
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.15), 0px 1px 3px rgba(0, 0, 0, 0.3);
      z-index: 80; /* ドロワー(100)やスクリム(90)より下に配置 */
      transition: box-shadow 0.2s, background-color 0.2s;
    }
    .floating-menu-button:hover {
      background-color: var(--md-sys-color-surface-variant);
      box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.15), 0px 2px 4px rgba(0, 0, 0, 0.3);
    }
    .floating-menu-button .material-symbols-outlined {
      font-size: 24px;
    }

    /* ナビゲーションドロワー */
    .nav-drawer {
      position: fixed;
      top: 0;
      left: -360px;
      width: 320px;
      height: 100%;
      background-color: var(--md-sys-color-surface);
      box-shadow: 2px 0 12px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      border-radius: 0 16px 16px 0;
    }
    .nav-drawer.open {
      transform: translateX(360px);
    }

    /* ドロワーヘッダー */
    .drawer-header {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--md-sys-color-surface-variant);
    }
    .drawer-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .drawer-title {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
      color: var(--md-sys-color-on-surface);
    }

    /* ドロワーコンテンツ・ボタン一覧 */
    .drawer-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    /* M3 スタイルのナビゲーションボタン */
    .drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      border-radius: 28px;
      text-decoration: none;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
      font-size: 14px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .drawer-item:hover {
      background-color: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }
    .drawer-item .material-symbols-outlined {
      font-size: 24px;
    }

    /* オーバーレイ（背景クリックで閉じる用） */
    .scrim {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 90;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .scrim.show {
      display: block;
      opacity: 1;
    }

    /* メインコンテンツエリア（FABと被らないように上部・左側に少し余白を確保） */
    .main-content {
      padding: 88px 24px 24px 24px;
      flex-grow: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <button class="floating-menu-button" id="menuBtn" aria-label="メニューを開く">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <div class="scrim" id="scrim"></div>

  <aside class="nav-drawer" id="navDrawer">
    <div class="drawer-header">
      <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/normal.png" alt="PBHub Logo" class="drawer-logo">
      <h2 class="drawer-title">PBHub</h2>
    </div>
    
    <nav class="drawer-content">
      <a href="/sites/" class="drawer-item">
        <span class="material-symbols-outlined">list_alt</span>
        <span>サイト一覧</span>
      </a>

      <a href="/search/" class="drawer-item">
        <span class="material-symbols-outlined">search</span>
        <span>サイト検索</span>
      </a>

      <hr style="border: none; border-top: 1px solid var(--md-sys-color-surface-variant); margin: 8px 0;">

      <button class="drawer-item" id="themeToggleBtn">
        <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
        <span id="themeText">ダークモードにする</span>
      </button>
    </nav>
  </aside>

  <main class="main-content">
    {{ content }}
  </main>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const navDrawer = document.getElementById('navDrawer');
    const scrim = document.getElementById('scrim');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    const themeText = document.getElementById('themeText');

    // --- ドロワー（ハンバーガーメニュー）制御 ---
    function openDrawer() {
      navDrawer.classList.add('open');
      scrim.classList.add('show');
    }

    function closeDrawer() {
      navDrawer.classList.remove('open');
      scrim.classList.remove('show');
    }

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDrawer();
    });

    scrim.addEventListener('click', closeDrawer);

    // ページ遷移を伴うリンク（aタグ）をクリックした時のみドロワーを閉じる
    const drawerLinks = document.querySelectorAll('.drawer-content a.drawer-item');
    drawerLinks.forEach(link => {
      link.addEventListener('click', closeDrawer);
    });

    // --- ダークモード切り替えロジック ---
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.setAttribute('data-theme', 'dark');
      updateThemeUI(true);
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      updateThemeUI(false);
    }

    function updateThemeUI(isDark) {
      if (isDark) {
        themeIcon.textContent = "light_mode";
        themeText.textContent = "ライトモードにする";
      } else {
        themeIcon.textContent = "dark_mode";
        themeText.textContent = "ダークモードにする";
      }
    }

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        updateThemeUI(false);
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        updateThemeUI(true);
      }
    });
  </script>
</body>
</html>
