<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - PBHub</title>

  <!-- Google Fonts & Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <!-- Import Map for Material Web -->
  <script type="importmap">
  {
    "imports": {
      "@material/web/": "https://esm.run/@material/web/"
    }
  }
  </script>
  <script type="module">
    import '@material/web/all.js';
  </script>

  <style>
    :root {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-secondary: #625B71;
      --md-sys-color-on-secondary: #FFFFFF;
      --md-sys-color-secondary-container: #E8DEF8;
      --md-sys-color-on-secondary-container: #1D192B;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-variant: #E7E0EC;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-background: #FEF7FF;
      --md-sys-color-on-background: #1D1B20;
      --md-sys-color-outline: #79747E;
      --md-sys-color-outline-variant: #C4C7C5;
      
      --md-ref-typeface-brand: 'Google Sans', 'Noto Sans JP', sans-serif;
      --md-ref-typeface-plain: 'Roboto', 'Noto Sans JP', sans-serif;

      font-family: var(--md-ref-typeface-plain);
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    :root.dark-mode {
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-primary-container: #4F378B;
      --md-sys-color-on-primary-container: #EADDFF;
      --md-sys-color-secondary: #CCC7DB;
      --md-sys-color-on-secondary: #332D41;
      --md-sys-color-secondary-container: #4A4458;
      --md-sys-color-on-secondary-container: #E8DEF8;
      --md-sys-color-surface: #141218;
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-surface-variant: #49454F;
      --md-sys-color-on-surface-variant: #CAC4D0;
      --md-sys-color-background: #141218;
      --md-sys-color-on-background: #E6E1E5;
      --md-sys-color-outline: #938F99;
      --md-sys-color-outline-variant: #49454F;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ハンバーガーメニューボタン */
    .floating-menu-button {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
    }

    /* ナビゲーションドロワー */
    md-navigation-drawer {
      --md-navigation-drawer-container-color: var(--md-sys-color-surface);
      --md-navigation-drawer-container-shape: 0 16px 16px 0;
    }

    .drawer-header {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      background-color: var(--md-sys-color-surface);
    }

    .drawer-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .drawer-title {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
      font-family: var(--md-ref-typeface-brand);
      color: var(--md-sys-color-on-surface);
    }

    /* スクリム（背景オーバーレイ） */
    .scrim {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 1500;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .scrim.show {
      display: block;
      opacity: 1;
      pointer-events: auto;
    }

    /* メインコンテンツ */
    main {
      flex-grow: 1;
      padding: 88px 24px 24px 24px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* フローティングテーマトグル */
    .floating-theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ナビゲーションドロワーアイテムのスタイル調整 */
    md-navigation-drawer-item {
      --md-navigation-drawer-item-container-shape: 0 28px 28px 0;
    }

    /* ダークモード対応のナビゲーション */
    :root.dark-mode md-navigation-drawer {
      --md-navigation-drawer-container-color: var(--md-sys-color-surface);
    }

    :root.dark-mode .drawer-header {
      border-bottom-color: var(--md-sys-color-outline-variant);
      background-color: var(--md-sys-color-surface);
    }

    :root.dark-mode .drawer-title {
      color: var(--md-sys-color-on-surface);
    }
  </style>
</head>
<body>

  <!-- ハンバーガーメニューボタン -->
  <md-fab class="floating-menu-button" id="menuBtn" size="medium" variant="secondary" aria-label="メニューを開く">
    <md-icon slot="icon">menu</md-icon>
  </md-fab>

  <!-- スクリム（背景マスク） -->
  <div class="scrim" id="scrim"></div>

  <!-- ナビゲーションドロワー -->
  <md-navigation-drawer id="navDrawer">
    <!-- ドロワーヘッダー -->
    <div class="drawer-header" slot="header">
      <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/normal.png" alt="PBHub Logo" class="drawer-logo">
      <h2 class="drawer-title">PBHub</h2>
    </div>

    <!-- ナビゲーションアイテム -->
    <md-navigation-drawer-item label="ホーム" href="{{ '/' | relative_url }}" class="link-item">
      <md-icon slot="icon">home</md-icon>
    </md-navigation-drawer-item>

    <md-navigation-drawer-item label="ブログ" href="{{ '/blog/' | relative_url }}" class="link-item">
      <md-icon slot="icon">rss_feed</md-icon>
    </md-navigation-drawer-item>

    <md-navigation-drawer-item label="アバウト" href="{{ '/about/' | relative_url }}" class="link-item">
      <md-icon slot="icon">info</md-icon>
    </md-navigation-drawer-item>

    <!-- セパレータ -->
    <div style="height: 1px; background-color: var(--md-sys-color-outline-variant); margin: 8px 16px;"></div>

    <!-- テーマ切り替えボタン -->
    <md-navigation-drawer-item id="themeToggleBtn" label="ダークモードにする">
      <md-icon slot="icon" id="themeIcon">dark_mode</md-icon>
    </md-navigation-drawer-item>
  </md-navigation-drawer>

  <!-- メインコンテンツ -->
  <main>
    {{ content }}
  </main>

  <!-- フローティングテーマトグル（カラーパレット） -->
  <div class="floating-theme-toggle">
    <input type="color" id="source-color" value="#6750a4" style="display: none;">
    <md-fab size="small" variant="secondary" onclick="document.getElementById('source-color').click()" aria-label="Color Palette">
      <md-icon slot="icon">palette</md-icon>
    </md-fab>
  </div>

  {% include fab-script.html %}
</body>
</html>
