<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - PBHub</title>

  <style>
    :root {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-variant: #E7E0EC;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-background: #FEF7FF;
      --md-sys-color-on-background: #1D1B20;
      
      font-family: Roboto, system-ui, -apple-system, sans-serif;
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ダークモードのカラーパレット */
    :root[data-theme="dark"] {
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-primary-container: #4F378B;
      --md-sys-color-on-primary-container: #EADDFF;
      --md-sys-color-surface: #141218;
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-surface-variant: #49454F;
      --md-sys-color-on-surface-variant: #CAC4D0;
      --md-sys-color-outline: #938F99;
      --md-sys-color-background: #141218;
      --md-sys-color-on-background: #E6E1E5;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* M3仕様 左上固定のフローティングメニューボタン (FAB) */
    .floating-menu-button {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 56px;
      height: 56px;
      border-radius: 16px; /* M3のFABは丸みを帯びた四角形 */
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.15), 0px 1px 3px rgba(0, 0, 0, 0.3);
      z-index: 80; /* ドロワー(100)やスクリム(90)より下に配置 */
      transition: box-shadow 0.2s, background-color 0.2s;
    }
    .floating-menu-button:hover {
      background-color: var(--md-sys-color-surface-variant);
      box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.15), 0px 2px 4px rgba(0, 0, 0, 0.3);
    }
    .floating-menu-button svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* ナビゲーションドロワー */
    .nav-drawer {
      position: fixed;
      top: 0;
      left: -360px;
      width: 320px;
      height: 100%;
      background-color: var(--md-sys-color-surface);
      box-shadow: 2px 0 12px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      border-radius: 0 16px 16px 0;
    }
    .nav-drawer.open {
      transform: translateX(360px);
    }

    /* ドロワーヘッダー */
    .drawer-header {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--md-sys-color-surface-variant);
    }
    .drawer-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .drawer-title {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
      color: var(--md-sys-color-on-surface);
    }

    /* ドロワーコンテンツ・ボタン一覧 */
    .drawer-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    /* M3 スタイルのナビゲーションボタン */
    .drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      border-radius: 28px;
      text-decoration: none;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
      font-size: 14px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .drawer-item:hover {
      background-color: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }
    .drawer-item svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* オーバーレイ（背景クリックで閉じる用） */
    .scrim {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 90;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .scrim.show {
      display: block;
      opacity: 1;
    }

    /* メインコンテンツエリア（FABと被らないように上部・左側に少し余白を確保） */
    .main-content {
      padding: 88px 24px 24px 24px;
      flex-grow: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <button class="floating-menu-button" id="menuBtn" aria-label="メニューを開く">
    <svg viewBox="0 -960 960 960"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
  </button>

  <div class="scrim" id="scrim"></div>

  <aside class="nav-drawer" id="navDrawer">
    <div class="drawer-header">
      <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/balls/poland/normal.png" alt="PBHub Logo" class="drawer-logo">
      <h2 class="drawer-title">PBHub</h2>
    </div>
    
    <nav class="drawer-content">
      <a href="/inspector/" class="drawer-item">
        <svg viewBox="0 -960 960 960"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
        <span>ツール検査バー</span>
      </a>

      <a href="/tools/" class="drawer-item">
        <svg viewBox="0 -960 960 960"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm40-80h80v-240h-80v240Zm160 0h80v-400h-80v400Zm160 0h80v-160h-80v160Z"/></svg>
        <span>ツール一覧</span>
      </a>

      <hr style="border: none; border-top: 1px solid var(--md-sys-color-surface-variant); margin: 8px 0;">

      <button class="drawer-item" id="themeToggleBtn">
        <svg id="themeIcon" viewBox="0 -960 960 960"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T439-664q0 94 66 160t160 66q49 0 95.5-24.5T836-527q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
        <span id="themeText">ダークモードにする</span>
      </button>
    </nav>
  </aside>

  <main class="main-content">
    {{ content }}
  </main>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const navDrawer = document.getElementById('navDrawer');
    const scrim = document.getElementById('scrim');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    const themeText = document.getElementById('themeText');

    // --- ドロワー（ハンバーガーメニュー）制御 ---
    function openDrawer() {
      navDrawer.classList.add('open');
      scrim.classList.add('show');
    }

    function closeDrawer() {
      navDrawer.classList.remove('open');
      scrim.classList.remove('show');
    }

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDrawer();
    });

    scrim.addEventListener('click', closeDrawer);

    const drawerItems = document.querySelectorAll('.drawer-item');
    drawerItems.forEach(item => {
      item.addEventListener('click', closeDrawer);
    });

    // --- ダークモード切り替えロジック ---
    const moonPath = "M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T439-664q0 94 66 160t160 66q49 0 95.5-24.5T836-527q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z";
    const sunPath = "M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-57 96 101-52 53Zm492 496-97-101 53-52 101 96-57 57Zm-97-496 97-101 57 57-101 96-53-52ZM155-211l101-96 52 53-96 101-57-57Z";

    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.setAttribute('data-theme', 'dark');
      updateThemeUI(true);
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      updateThemeUI(false);
    }

    function updateThemeUI(isDark) {
      if (isDark) {
        themeIcon.querySelector('path').setAttribute('d', sunPath);
        themeText.textContent = "ライトモードにする";
      } else {
        themeIcon.querySelector('path').setAttribute('d', moonPath);
        themeText.textContent = "ダークモードにする";
      }
    }

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        updateThemeUI(false);
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        updateThemeUI(true);
      }
    });
  </script>
</body>
</html>
